<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GreenPulse — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    :root {
      --primary: #3fff8b;
      --surface: #07090a;
      --card-bg: rgba(20, 22, 21, 0.6);
      --border: rgba(255, 255, 255, 0.07);
    }

    body {
      min-height: 100dvh;
      padding-bottom: 90px;
      background: var(--surface);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 5rem 1rem 1rem;
    }

    /* Card & Layout Components */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 1.375rem;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 0.875rem;
    }

    .sec-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #ababac;
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 1.25rem 1rem .625rem;
    }

    /* Avatar Ring Logic */
    .avatar-wrap {
      position: relative;
      width: 68px;
      height: 68px;
      flex-shrink: 0;
    }

    .avatar-letter {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.625rem;
      font-weight: 900;
      color: var(--primary);
      background: rgba(63, 255, 139, 0.15);
    }

    /* Stat Strip */
    .stat-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .sc {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem .5rem;
      gap: .15rem;
    }

    .sc:not(:last-child) {
      border-right: 1px solid rgba(255, 255, 255, .06);
    }

    .sc-big {
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1;
    }

    .sc-tiny {
      font-size: .56rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #ababac;
    }

    /* Badge Grid */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      padding: 0 1rem 1.25rem;
    }

    .bdg {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .375rem;
      padding: .875rem .5rem;
      border-radius: 1.125rem;
      background: rgba(24, 26, 25, .6);
      border: 1px solid var(--border);
      text-align: center;
      transition: transform .2s;
    }

    .bdg-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Weekly Chart */
    .week-bars {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      height: 72px;
      padding: 0 1rem;
    }

    .wbar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .wbar-bg {
      width: 100%;
      border-radius: .4rem .4rem 0 0;
      position: relative;
      overflow: hidden;
    }

    .wbar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0;
      transition: height 1s cubic-bezier(.4, 0, .2, 1);
    }

    /* Toggles */
    .tog {
      position: relative;
      width: 42px;
      height: 23px;
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .tog-sl {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      cursor: pointer;
      transition: .25s;
    }

    .tog-sl::before {
      content: '';
      position: absolute;
      width: 17px;
      height: 17px;
      left: 3px;
      top: 3px;
      background: #ababac;
      border-radius: 50%;
      transition: .25s;
    }

    .tog input:checked+.tog-sl {
      background: rgba(63, 255, 139, 0.4);
    }

    .tog input:checked+.tog-sl::before {
      transform: translateX(19px);
      background: var(--primary);
    }

    /* Animation */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page>* {
      animation: slideUp .45s cubic-bezier(.32, .72, 0, 1) both;
    }

    .page>*:nth-child(n) {
      animation-delay: calc(0.05s * var(--i, 1));
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(7, 9, 10, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .sign-out-btn {
      padding: .4rem .875rem;
      border-radius: 999px;
      background: rgba(255, 113, 80, .12);
      border: 1px solid rgba(255, 113, 80, .28);
      color: #ff7350;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body class="bio-glow">

  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:.75rem;">
      <a href="dashboard.html" style="text-decoration:none; color:white; display:flex; align-items:center;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
        </svg>
      </a>
      <span style="font-size:1.1rem;font-weight:800;">My Profile</span>
    </div>
    <button onclick="doLogout()" class="sign-out-btn">Sign Out</button>
  </header>

  <div class="page">
    <div class="card" style="--i:1">
      <div style="padding:1.5rem;display:flex;align-items:center;gap:1.25rem;">
        <div class="avatar-wrap">
          <svg width="68" height="68" viewBox="0 0 68 68" style="transform:rotate(-90deg);position:absolute;">
            <circle cx="34" cy="34" r="30" fill="transparent" stroke="rgba(255,255,255,.07)" stroke-width="4" />
            <circle id="av-ring" cx="34" cy="34" r="30" fill="transparent" stroke="#3fff8b" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5"
              style="filter:drop-shadow(0 0 5px rgba(63,255,139,.6)); transition: 1.2s ease;" />
          </svg>
          <div class="avatar-letter" id="av-letter">B</div>
        </div>
        <div>
          <div id="p-name" style="font-size:1.4rem;font-weight:900;">Bengaluru User</div>
          <div id="p-meta"
            style="font-size:.75rem;color:#ababac;margin-top:4px;display:flex;align-items:center;gap:6px;">
            <span id="p-city">📍 Bengaluru</span> • <span id="p-since">Since 2025</span>
          </div>
        </div>
      </div>
      <div class="stat-strip">
        <div class="sc">
          <div class="sc-tiny">Journeys</div>
          <div class="sc-big" id="sc-journeys">24</div>
        </div>
        <div class="sc">
          <div class="sc-tiny">CO₂ Saved</div>
          <div class="sc-big" id="sc-co2" style="color:var(--primary);">850g</div>
        </div>
        <div class="sc">
          <div class="sc-tiny">Avg Lungs</div>
          <div class="sc-big" id="sc-lungs" style="color:#ffbd5c;">82</div>
        </div>
      </div>
    </div>

    <div class="card" style="--i:2">
      <div class="sec-title">🏆 Health Badges</div>
      <div class="badge-grid" id="badge-grid">
        <div class="bdg">
          <div class="bdg-icon">🌱</div>
          <div style="font-size:0.7rem;font-weight:700;">Green Starter</div>
        </div>
        <div class="bdg">
          <div class="bdg-icon">💨</div>
          <div style="font-size:0.7rem;font-weight:700;">Air Hero</div>
        </div>
        <div class="bdg" style="opacity:0.4">
          <div class="bdg-icon">🚲</div>
          <div style="font-size:0.7rem;font-weight:700;">Cyclist 🔒</div>
        </div>
      </div>
    </div>

    <div class="card" style="--i:3">
      <div class="sec-title">📊 This Week</div>
      <div class="week-bars" id="week-bars" style="margin-bottom:10px;">
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#ffbd5c30;">
            <div class="wbar-fill" style="height:70%; background:#ffbd5c;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#ff735030;">
            <div class="wbar-fill" style="height:45%; background:#ff7350;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#ffbd5c30;">
            <div class="wbar-fill" style="height:85%; background:#ffbd5c;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#ff735030;">
            <div class="wbar-fill" style="height:40%; background:#ff7350;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#3fff8b30;">
            <div class="wbar-fill" style="height:95%; background:#3fff8b;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#3fff8b30;">
            <div class="wbar-fill" style="height:100%; background:#3fff8b;"></div>
          </div>
        </div>
        <div class="wbar-wrap" style="flex:1;">
          <div class="wbar-bg" style="height:60px; background:#ffbd5c30;">
            <div class="wbar-fill" style="height:75%; background:#ffbd5c;"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-around;padding-bottom:15px; font-size:0.6rem; color:#ababac;">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
    </div>

    <div class="card" style="--i:4">
      <div class="sec-title">Account</div>
      <div class="set-row" onclick="doLogout()"
        style="display:flex;justify-content:space-between;padding:1.25rem;cursor:pointer;">
        <div style="color:#ff7350;font-weight:700; font-size:0.9rem;">Sign Out</div>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#ff7350">
          <path
            d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
        </svg>
      </div>
    </div>
  </div>

  <nav id="bottom-nav"></nav>

  <script src="assets/app.js"></script>
  <script>
    function init() {
      // Avatar Progress Ring Animation
      const circ = 2 * Math.PI * 30;
      const ring = document.getElementById("av-ring");
      ring.style.strokeDasharray = circ;
      setTimeout(() => {
        ring.style.strokeDashoffset = circ - (0.82 * circ); // 82% progress
      }, 500);

      // Dynamic Bottom Nav (if your app.js supports it)
      if (typeof buildBottomNav === 'function') buildBottomNav("profile");
    }

    function doLogout() {
      if (confirm("Are you sure you want to sign out?")) {
        localStorage.removeItem("gp_user");
        window.location.href = "login.html";
      }
    }

    init();
  </script>
</body>

</html>
