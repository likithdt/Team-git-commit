<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenPulse — Plan Route</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      font-size: 24px; line-height: 1;
    }
    .route-svg-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 1.8s ease forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body class="bioluminescent-glow min-h-screen pb-28">

<!-- Top Bar -->
<header class="top-bar">
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="w-9 h-9 rounded-full glass-vessel flex items-center justify-center border border-white/10 active:scale-90 transition-transform">
      <span class="material-symbols-outlined text-on-surface-variant text-[20px]">arrow_back</span>
    </a>
    <span class="text-lg font-bold text-primary text-glow-primary tracking-tight">Plan Route</span>
  </div>
  <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full glass-vessel border border-white/10">
    <div id="aqi-dot" class="w-2 h-2 rounded-full bg-primary"></div>
    <span class="text-xs font-semibold text-on-surface-variant">AQI <span id="header-aqi">—</span></span>
  </div>
</header>

<!-- Map Background -->
<div class="fixed inset-0 z-0 overflow-hidden bg-black">
  <div class="map-gradient-overlay absolute inset-0 z-10 pointer-events-none"></div>
  <!-- Animated city grid -->
  <svg class="absolute inset-0 w-full h-full opacity-15" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3fff8b" stroke-width="0.5" opacity="0.4"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>
  <!-- Route paths (updated dynamically) -->
  <svg id="route-svg" class="absolute inset-0 w-full h-full z-10 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
    <path id="route-path-1" class="route-svg-path" d="M 120 80% Q 40% 40% 85% 20%" fill="none" stroke="#3fff8b" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path id="route-path-2" class="route-svg-path" d="M 120 80% C 30% 60% 60% 35% 85% 20%" fill="none" stroke="#ffbd5c" stroke-width="3.5" stroke-linecap="round" opacity="0.45" style="animation-delay:0.3s"/>
    <path id="route-path-3" class="route-svg-path" d="M 120 80% C 20% 70% 70% 50% 85% 20%" fill="none" stroke="#ff7350" stroke-width="3" stroke-linecap="round" opacity="0.35" style="animation-delay:0.6s"/>
  </svg>
</div>

<main class="relative z-20 pt-24 px-4 max-w-2xl mx-auto space-y-4">

  <!-- Search Panel -->
  <section class="glass-vessel rounded-2xl p-5 space-y-3">
    <h1 class="text-2xl font-extrabold tracking-tight">
      Find your <span class="text-primary text-glow-primary">cleanest</span> path.
    </h1>
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">my_location</span>
      <input id="origin-input" class="glass-input" type="text" placeholder="Starting point (e.g. MG Road)" value="MG Road, Bengaluru"
             style="color:#fff;background:rgba(36,38,39,0.8);-webkit-text-fill-color:#fff"/>
    </div>
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">near_me</span>
      <input id="dest-input" class="glass-input" type="text" placeholder="Destination (e.g. Koramangala)"
             style="color:#fff;background:rgba(36,38,39,0.8);-webkit-text-fill-color:#fff"/>
    </div>
    <button id="plan-btn" class="btn-primary flex items-center justify-center gap-2" onclick="planRoutes()">
      <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">auto_awesome</span>
      Generate AI Healthy Routes
    </button>
  </section>

  <!-- Stats Row -->
  <div class="grid grid-cols-2 gap-3">
    <div class="stat-chip glass-vessel rounded-2xl">
      <span class="label">AQI Now</span>
      <span class="value" id="stat-aqi" style="color:#3fff8b">—</span>
      <span class="text-on-surface-variant text-xs" id="stat-aqi-cat"></span>
    </div>
    <div class="stat-chip glass-vessel rounded-2xl">
      <span class="label">Traffic</span>
      <span class="value text-secondary" id="stat-traffic">—</span>
      <span class="text-on-surface-variant text-xs" id="stat-temp"></span>
    </div>
  </div>

  <!-- Route Results -->
  <div id="routes-container">
    <!-- Placeholder shown before search -->
    <div class="glass-vessel rounded-2xl p-8 text-center text-on-surface-variant flex flex-col items-center gap-3">
      <span class="material-symbols-outlined text-[48px] text-primary/40" style="font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 48">route</span>
      <p class="text-sm">Enter your destination and tap <strong class="text-on-surface">Generate Routes</strong> to see Gemini-powered health analysis.</p>
    </div>
  </div>

  <!-- AI Window Recommendation -->
  <div id="window-card" class="hidden glass-vessel rounded-2xl p-5 border border-primary/15">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-primary/15 flex items-center justify-center border border-primary/25 flex-shrink-0 relative pulse-ring">
        <span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">timer</span>
      </div>
      <div>
        <div class="text-xs text-primary font-bold uppercase tracking-widest">AI Departure Window</div>
        <div id="window-text" class="font-bold text-base mt-0.5">—</div>
        <div id="insight-text" class="text-on-surface-variant text-xs mt-1 leading-relaxed"></div>
      </div>
    </div>
  </div>

</main>

<nav id="bottom-nav"></nav>

<script src="assets/app.js"></script>
<script>
buildBottomNav("route");

// Load initial AQI
(async () => {
  try {
    const d = await API.dashboard();
    document.getElementById("header-aqi").textContent = d.aqi;
    document.getElementById("aqi-dot").style.background = d.aqi_category.color;
    document.getElementById("stat-aqi").textContent = d.aqi;
    document.getElementById("stat-aqi").style.color = d.aqi_category.color;
    document.getElementById("stat-aqi-cat").textContent = d.aqi_category.label;
    document.getElementById("stat-traffic").textContent =
      d.aqi < 60 ? "Low" : d.aqi < 120 ? "Moderate" : "High";
    document.getElementById("stat-temp").textContent = `${d.temperature}°C`;
  } catch(_) {}
})();

async function planRoutes() {
  const origin = document.getElementById("origin-input").value.trim() || "MG Road";
  const dest   = document.getElementById("dest-input").value.trim();
  if (!dest) {
    document.getElementById("dest-input").focus();
    document.getElementById("dest-input").style.borderColor = "rgba(255,113,80,0.6)";
    return;
  }
  document.getElementById("dest-input").style.borderColor = "";

  const btn = document.getElementById("plan-btn");
  btn.disabled = true;
  btn.innerHTML = `<div class="w-5 h-5 border-2 border-[#004f24] border-t-transparent rounded-full animate-spin"></div> Analysing with Gemini AI…`;

  const container = document.getElementById("routes-container");
  showLoading(container, "Running Multi-Criteria Decision Making…");

  try {
    const data = await API.routes(origin, dest);
    State.lastRoutes = data;
    renderRoutes(data, origin, dest);
  } catch(e) {
    showError(container, "Could not reach the GreenPulse API.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24">auto_awesome</span> Generate AI Healthy Routes`;
  }
}

function renderRoutes(data, origin, dest) {
  const container = document.getElementById("routes-container");
  container.innerHTML = data.ranked_routes.map((r, i) => `
    <a href="journey.html?rank=${r.rank}&origin=${encodeURIComponent(origin)}&dest=${encodeURIComponent(dest)}"
       class="route-card glass-vessel border block"
       style="border-color:${r.color}22; animation-delay:${i * 0.1}s"
       onmouseover="this.style.boxShadow='0 0 28px ${r.color}25'"
       onmouseout="this.style.boxShadow=''">
      <!-- Rank badge -->
      <div class="flex items-start justify-between mb-4">
        <div>
          <span class="badge" style="color:${r.color}; border-color:${r.color}44; background:${r.color}15">${r.tag}</span>
          <div class="text-lg font-bold mt-2">${r.name}</div>
        </div>
        <div class="text-right">
          <div class="text-3xl font-black" style="color:${r.color}">${r.lungs_score}</div>
          <div class="text-[10px] font-bold uppercase tracking-widest" style="color:${r.color}99">Lungs Score</div>
        </div>
      </div>
      <!-- Metrics row -->
      <div class="flex gap-5 mb-3 text-sm">
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-on-surface-variant text-[16px]">schedule</span>
          <span class="font-medium">${r.duration_min} min</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-on-surface-variant text-[16px]">straighten</span>
          <span class="font-medium">${r.distance_km} km</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]" style="color:${r.color}">eco</span>
          <span class="font-medium">${r.co2_saved_g}g CO₂</span>
        </div>
      </div>
      <!-- AQI bar -->
      <div class="mb-3">
        <div class="flex justify-between text-xs text-on-surface-variant mb-1">
          <span>AQI Exposure</span><span>${r.aqi_avg}</span>
        </div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden">
          <div class="h-full rounded-full" style="width:${Math.min(100,(r.aqi_avg/200)*100)}%; background:${r.color}; transition: width 0.8s ease"></div>
        </div>
      </div>
      <!-- Health benefit -->
      <p class="text-xs text-on-surface-variant leading-relaxed">${r.health_benefit}</p>
      <!-- Leave window -->
      <div class="mt-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-[14px]" style="color:${r.color};font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">timer</span>
        <span class="text-xs font-semibold" style="color:${r.color}99">${r.leave_window}</span>
      </div>
    </a>
  `).join("");

  // Window card
  const wc = document.getElementById("window-card");
  wc.classList.remove("hidden");
  document.getElementById("window-text").textContent =
    data.best_window_minutes === 0
      ? "Leave now — air is at its cleanest."
      : `Leave in ${data.best_window_minutes} minutes for best air quality.`;
  document.getElementById("insight-text").textContent = data.ai_insight || "";
}
</script>
</body>
</html>
