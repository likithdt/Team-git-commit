<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GreenPulse — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    .phone-frame{color:var(--on-surf);padding-bottom:80px;min-height:100dvh;}
    .hero-section{border-radius:1.5rem;padding:1.5rem;position:relative;overflow:hidden;}
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
    .quick-card{border-radius:1.25rem;padding:1.125rem;display:flex;flex-direction:column;gap:.75rem;text-decoration:none;color:var(--on-surf);border:1px solid rgba(255,255,255,.05);transition:all .2s;}
    .quick-card:active{transform:scale(.97);}
    .leave-cta{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-radius:1rem;border:1px solid rgba(63,255,139,.2);background:rgba(63,255,139,.05);}
  </style>
</head>
<body class="bio-glow" style="min-height:100dvh;padding-bottom:80px;">


  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:.75rem;">
      <div style="width:2rem;height:2rem;border-radius:50%;background:rgba(63,255,139,.15);border:1px solid rgba(63,255,139,.35);display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#3fff8b"><path d="M17 8C8 10 5.9 16.17 3.82 21L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20c4 0 4-2 8-2s4 2 8 2V4c-1 0-3 .75-7 4z"/></svg>
      </div>
      <span style="font-size:1.0625rem;font-weight:800;color:#3fff8b;text-shadow:0 0 10px rgba(63,255,139,.4);letter-spacing:-.02em;">GreenPulse</span>
    </div>
    <div style="display:flex;align-items:center;gap:.375rem;padding:.35rem .75rem;border-radius:999px;background:rgba(18,19,21,.7);border:1px solid rgba(255,255,255,.08);">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="#3fff8b"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span id="city-lbl" style="font-size:.7rem;font-weight:600;color:#ababac;">Bengaluru</span>
    </div>
  </header>

  <div style="padding:4.5rem 1rem 1.5rem;display:flex;flex-direction:column;gap:.875rem;">

    <!-- Hero: Score -->
    <section class="hero-section glass glow-green">
      <div style="position:absolute;top:-5rem;left:-5rem;width:14rem;height:14rem;background:rgba(63,255,139,.07);border-radius:50%;filter:blur(50px);pointer-events:none;"></div>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.875rem;">
        <div id="score-ring"></div>
        <div>
          <h2 id="greeting" style="font-size:1.125rem;font-weight:800;">Loading…</h2>
          <p id="score-desc" style="color:#ababac;font-size:.8125rem;margin-top:.25rem;max-width:260px;line-height:1.4;"></p>
        </div>
        <div class="leave-cta" id="leave-cta" style="display:none;width:100%;">
          <div>
            <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#ababac;">Best time to leave</div>
            <div id="leave-time" style="font-size:1.0625rem;font-weight:800;color:#3fff8b;margin-top:.15rem;"></div>
          </div>
          <a href="route-planner.html" style="padding:.5rem 1rem;background:linear-gradient(135deg,#3fff8b,#13ea79);color:#004f24;font-weight:700;font-size:.8125rem;border-radius:999px;text-decoration:none;">Plan Route</a>
        </div>
      </div>
    </section>

    <!-- Stats -->
    <div class="stat-row">
      <div class="stat-chip glass">
        <span class="lbl">AQI</span>
        <span class="val" id="st-aqi" style="color:#3fff8b">—</span>
        <span class="sub" id="st-aqi-l"></span>
      </div>
      <div class="stat-chip glass">
        <span class="lbl">Temperature</span>
        <span class="val" id="st-temp" style="color:#ffbd5c">—</span>
        <span class="sub" id="st-desc"></span>
      </div>
      <div class="stat-chip glass">
        <span class="lbl">PM2.5</span>
        <span class="val" id="st-pm" style="color:#ff7350">—</span>
        <span class="sub">µg/m³</span>
      </div>
      <div class="stat-chip glass">
        <span class="lbl">Wind</span>
        <span class="val" id="st-wind">—</span>
        <span class="sub">m/s</span>
      </div>
    </div>

    <!-- Community -->
    <div class="glass" style="border-radius:1.25rem;padding:1rem 1.125rem;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#ababac;margin-bottom:.25rem;">Active Commuters</div>
        <div style="font-size:1.5rem;font-weight:900;" id="st-comm">—</div>
        <div style="font-size:.7rem;color:#ababac;margin-top:.1rem;">sharing data right now</div>
      </div>
      <div style="width:2.5rem;height:2.5rem;border-radius:50%;background:rgba(63,255,139,.12);border:1px solid rgba(63,255,139,.25);display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#3fff8b"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
    </div>

    <!-- Pollution Avoided -->
    <div class="glass" style="border-radius:1.25rem;padding:1rem 1.125rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
        <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#ababac;">Pollution Avoided Today</div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#3fff8b"><path d="M17 8C8 10 5.9 16.17 3.82 21L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20c4 0 4-2 8-2s4 2 8 2V4c-1 0-3 .75-7 4z"/></svg>
      </div>
      <div style="display:flex;align-items:flex-end;gap:.5rem;margin-bottom:.625rem;">
        <span style="font-size:2rem;font-weight:900;color:#3fff8b;" id="st-avoid">—</span>
        <span style="color:#ababac;font-size:.8125rem;margin-bottom:.25rem;">mg PM2.5 saved</span>
      </div>
      <div style="height:5px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;">
        <div id="avoid-bar" style="height:100%;border-radius:999px;background:linear-gradient(90deg,#3fff8b,#13ea79);width:0%;transition:width 1s ease;"></div>
      </div>
    </div>

    <!-- Quick Nav -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
      <a href="route-planner.html" class="quick-card glass">
        <div style="width:2.25rem;height:2.25rem;border-radius:.75rem;background:rgba(63,255,139,.12);border:1px solid rgba(63,255,139,.2);display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#3fff8b"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
        </div>
        <div>
          <div style="font-weight:700;font-size:.875rem;">Plan Route</div>
          <div style="color:#ababac;font-size:.75rem;margin-top:.15rem;">Healthiest path AI</div>
        </div>
      </a>
      <a href="heatmap.html" class="quick-card glass">
        <div style="width:2.25rem;height:2.25rem;border-radius:.75rem;background:rgba(255,113,80,.12);border:1px solid rgba(255,113,80,.2);display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#ff7350"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        </div>
        <div>
          <div style="font-weight:700;font-size:.875rem;">City Heatmap</div>
          <div style="color:#ababac;font-size:.75rem;margin-top:.15rem;">Live pollution zones</div>
        </div>
      </a>
    </div>

    <!-- AI insight -->
    <div id="ai-insight" class="glass" style="border-radius:1.25rem;padding:1rem 1.125rem;border:1px solid rgba(63,255,139,.1);display:none;">
      <div style="display:flex;gap:.75rem;align-items:flex-start;">
        <div style="width:2rem;height:2rem;border-radius:50%;background:rgba(63,255,139,.15);border:1px solid rgba(63,255,139,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="#3fff8b"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
        </div>
        <div>
          <div style="font-size:.6rem;color:#3fff8b;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.25rem;">AI Insight</div>
          <p id="ai-text" style="font-size:.8125rem;color:#ababac;line-height:1.5;"></p>
        </div>
      </div>
    </div>

  </div>
  <nav id="bottom-nav"></nav>
</div>

<script src="assets/app.js"></script>
<script>
buildBottomNav("dashboard");

(async()=>{
  try{
    const d=await API.dashboard();
    renderScoreRing("score-ring",d.lungs_score);
    document.getElementById("greeting").textContent=`${d.greeting}, ${d.city}.`;
    const cat=d.aqi_category;
    document.getElementById("score-desc").textContent=`Air quality is ${cat.label.toLowerCase()}. AQI ${d.aqi} — ${d.lungs_score>=70?"Great day for a walk!":d.lungs_score>=45?"Consider a clean route.":"Limit outdoor exposure."}`;
    document.getElementById("st-aqi").textContent=d.aqi;
    document.getElementById("st-aqi").style.color=cat.color;
    document.getElementById("st-aqi-l").textContent=cat.label;
    document.getElementById("st-temp").textContent=`${d.temperature}°C`;
    document.getElementById("st-desc").textContent=d.description;
    document.getElementById("st-pm").textContent=d.pm25;
    document.getElementById("st-wind").textContent=d.wind_speed;
    document.getElementById("st-comm").textContent=d.active_commuters.toLocaleString();
    document.getElementById("st-avoid").textContent=d.pollution_avoided_today;
    setTimeout(()=>{document.getElementById("avoid-bar").style.width=Math.min(100,(d.pollution_avoided_today/340)*100)+"%";},300);
    const lc=document.getElementById("leave-cta");
    lc.style.display="flex";
    document.getElementById("leave-time").textContent=d.best_leave_in_min===0?"Leave now — cleanest air now":`In ${d.best_leave_in_min} minutes`;
    const ai=document.getElementById("ai-insight");
    ai.style.display="block";
    document.getElementById("ai-text").textContent=`Current AQI is ${d.aqi} (${cat.label}). ${d.aqi<=60?"Excellent conditions — ideal for cycling or walking.":"Take the Green Artery route to cut your PM2.5 exposure by up to 35%."}`;
  }catch(e){
    document.getElementById("greeting").textContent="Backend offline";
    document.getElementById("score-desc").textContent="Start the FastAPI server to see live data.";
  }
})();
</script>
</body>
</html>
